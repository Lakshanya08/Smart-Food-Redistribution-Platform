<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assign Volunteer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-assign {
            background: #ffffff;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0px 20px 50px rgba(0,0,0,0.2);
            width: 500px;
            text-align: center;
        }
        h2 {
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }
        .volunteer-option {
            display: block;
            margin: 15px 0;
            font-size: 18px;
        }
        .btn-assign {
            background: #28a745;
            color: white;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-assign:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="card-assign">
    <h2>Assign Volunteer</h2>
    <form method="POST">
        {% for v in volunteers %}
        <label class="volunteer-option">
            <input type="radio" name="volunteer_name" value="{{ v[1] }}" required>
            {{ v[1] }} - {{ v[2] }}
        </label>
        {% endfor %}
        <button type="submit" class="btn btn-assign mt-3">Assign Volunteer</button>
    </form>
</div>

</body>
</html>

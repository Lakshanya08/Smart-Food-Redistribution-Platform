<!DOCTYPE html>
<html>
<head>
    <title>Accepted Donations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg,#11998e,#38ef7d);">

<!-- ✅ GO HOME BUTTON -->
<div style="position:fixed; top:20px; right:20px; z-index:999;">
    <a href="/" class="btn btn-dark">🏠 Go Home</a>
</div>

<div class="container mt-5">
    <h2 class="text-center text-white mb-4">📦 Donations - Waiting for Acceptance</h2>

    <div class="row">
        {% for d in donations %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-lg p-3">
                <h5>{{ d[1] }}</h5>
                <p><b>Quantity:</b> {{ d[2] }}</p>
                <p><b>Location:</b> {{ d[5] }}</p>
                <p><b>Status:</b> {{ d[8] }}</p>
                <a href="/details/{{ d[0] }}" class="btn btn-primary w-100">View Details</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>

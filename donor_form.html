<!DOCTYPE html>
<html>
<head>
    <title>Food Donation Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg,#1d2b64,#f8cdda);">

<!-- ✅ GO HOME BUTTON -->
<div style="position:fixed; top:20px; right:20px; z-index:999;">
    <a href="/" class="btn btn-dark">🏠 Go Home</a>
</div>

<div class="container mt-5 mb-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center">🍲 Donation Form</h2>

        <form action="/donor" method="POST">

            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
            <input type="text" name="quantity" class="form-control mb-3" placeholder="Quantity" required>
            <input type="date" name="date" class="form-control mb-3" required>
            <input type="time" name="pickup_time" class="form-control mb-3" required>
            <input type="text" name="location" class="form-control mb-3" placeholder="Pickup Location" required>
            <textarea name="suggestions" class="form-control mb-3" placeholder="Suggestions"></textarea>
            <input type="tel" name="contact" class="form-control mb-3" placeholder="Contact Number" required>

            <button type="submit" class="btn btn-primary w-100">Submit Donation</button>
        </form>
    </div>
</div>

</body>
</html>

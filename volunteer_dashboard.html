<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volunteer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height: 100vh;
            padding: 40px 0;
        }
        h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .card-volunteer {
            border-radius: 20px;
            transition: 0.3s;
        }
        .card-volunteer:hover {
            transform: translateY(-5px);
            box-shadow: 0px 15px 40px rgba(0,0,0,0.3);
        }
        .btn-accept {
            background: #28a745;
            color: white;
            border-radius: 50px;
            font-weight: 600;
        }
        .btn-reject {
            background: #dc3545;
            color: white;
            border-radius: 50px;
            font-weight: 600;
        }
        .btn-home {
            background: white;
            color: #764ba2;
            font-weight: 600;
            border-radius: 50px;
            padding: 8px 20px;
            text-decoration: none;
        }
        .btn-home:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Home Button -->
    <div class="text-end mb-3">
        <a href="/" class="btn-home">🏠 Go to Home</a>
    </div>

    <h2>Volunteer Dashboard - Pending Assignments</h2>

    <div class="row">
        {% for d in assignments %}
        <div class="col-md-4 mb-4">
            <div class="card card-volunteer shadow-lg p-3 bg-white">
                <h5>{{ d[1] }}</h5>
                <p><b>Quantity:</b> {{ d[2] }}</p>
                <p><b>Location:</b> {{ d[5] }}</p>
                <p><b>Pickup Time:</b> {{ d[4] }} at {{ d[3] }}</p>
                <p><b>NGO Status:</b> {{ d[9] }}</p>
                <div class="d-flex justify-content-between mt-3">
                    <a href="/volunteer_action/{{ d[0] }}/accept" class="btn btn-accept w-50 me-2">Accept</a>
                    <a href="/volunteer_action/{{ d[0] }}/reject" class="btn btn-reject w-50">Reject</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>

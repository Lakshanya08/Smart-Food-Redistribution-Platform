<!DOCTYPE html>
<html>
<head>
    <title>NGO Action Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-card {
            background: white;
            padding: 60px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0px 25px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .btn-custom {
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="result-card">
    <div class="icon text-{{ color }}">
        {% if color == 'success' %}
            ✔
        {% else %}
            ✖
        {% endif %}
    </div>

    <h2 class="text-{{ color }} fw-bold">
        {{ message }}
    </h2>

    <p class="text-muted mt-3">
        The donation status has been updated successfully.
    </p>

    <div class="mt-4">
        <a href="/dashboard" class="btn btn-primary btn-custom me-2">
            📊 View Dashboard
        </a>

        <a href="/" class="btn btn-outline-dark btn-custom">
            🏠 Home
        </a>
    </div>
</div>

</body>
</html>
